<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Serralheria Metal Art</title>

    <link rel="icon" type="image/png" sizes="512x512" href="fotos/favicon.png">
    <link rel="apple-touch-icon" href="fotos/favicon.png">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #0044cc;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        header img {
            max-width: 200px;
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 8px;
        }
        .voltar {
            display: inline-block;
            margin: 25px 0;
            color: #0044cc;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #0044cc;
            padding: 10px 20px;
            border-radius: 25px;
            transition: 0.3s;
        }

        .voltar:hover {
            background-color: #0044cc;
            color: white;
        }
        .galeria-fotos {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .galeria-fotos img {
            width: 100%;
            height: 300px; /* Altura fixa para alinhar */
            object-fit: cover; /* Corta a imagem sem esticar */
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 3px solid #f4f4f4;
        }
        .secao-contato {
            margin: 50px 20px;
            padding: 30px;
            background-color: #f9f9f9;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .btn-zap-final {
            display: inline-block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 20px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-zap-final:hover {
            transform: scale(1.05);
            background-color: #1ebe57;
        }

        /* 5. FOOTER (IGUAL AO INDEX) */
        footer {
            background-color: #0044cc;
            color: white;
            padding: 40px 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>

<header>
    <img src="fotos/logo.png" alt="Metal Art Serralheria">
    <h1>Nossos Trabalhos</h1>
</header>

<a href="index.html" class="voltar">⬅ Voltar ao Início</a>

<section class="galeria-fotos">
    <img src="fotos/enrolar/enrolar1.jpg" alt="Portão de Enrolar (Comercial) "loading="lazy">
</section>

<section class="secao-contato">
    <h3>Gostou de algum desses?</h3>
    <p>Fale direto com a Serralheria Metal Art para um orçamento gratuito!</p>
    <br>
    <a href="https://wa.me/554196121144?text=Olá!+Vi+as+fotos+no+site+e+quero+um+orçamento+de+um+portão+de+enrolar+(comercial)!" class="btn-zap-final">
        Solicitar Orçamento via WhatsApp
    </a>
</section>

<footer>
    <p>&copy; 2026 Serralheria Metal Art - Pinhais/PR</p>
</footer>

</body>
</html>
