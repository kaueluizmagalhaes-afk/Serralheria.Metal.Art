<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serralheria - Catálogo de Serviços</title>
    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
        }

        header {
            background-color: #0044cc; /* AZUL */
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        /* FILTRO ABAIXO DO HEADER (Aprox. 1.5cm = 55px) */
        #servicos {
            margin-top: 55px; /* O "pulo" de 1,5cm que você pediu */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #servicos h2 {
            margin-bottom: 25px;
            color: #cc0000; /* VERMELHO no título também */
            text-transform: uppercase;
            font-size: 24px;
        }

        .menu-botoes {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        /* BOTÕES VERMELHOS */
        .menu-botoes button {
            background-color: #cc0000; /* VERMELHO SERRALHERIA */
            color: white; /* TEXTO BRANCO */
            border: 2px solid #cc0000;
            padding: 20px;
            font-size: 19px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        .menu-botoes button:hover {
            background-color: #ffffff;
            color: #cc0000; /* Inverte as cores no hover */
            border: 2px solid #cc0000;
            transform: translateY(-3px);
        }

        /* SEÇÃO DO VÍDEO (Agora fica abaixo do filtro) */
        .video-secao {
            max-width: 900px;
            margin: 60px auto;
            padding: 20px;
            text-align: center;
        }

        .video-secao video {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 3px solid #0044cc; /* Moldura azul no vídeo */
        }

        footer {
            background-color: #0044cc;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin-top: 50px;
        }

        .social-links a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            border: 1px solid white;
            padding: 8px 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Serralheria em Aço e Ferro</h1>
    <p>Qualidade, resistência e preço justo.</p>
</header>

<section id="servicos">
    <h2>O que você procura hoje?</h2>
    <div class="menu-botoes">
        <button onclick="location.href='portoes.html'">Portões</button>
        <button onclick="location.href='reformas.html'">Reformas e Manutenções</button>
        <button onclick="location.href='estruturas.html'">Estruturas Metálicas</button>
    </div>
</section>

<section class="video-secao">
    <h2>Veja como trabalhamos</h2>
    <video controls poster="capa-do-video.jpg">
        <source src="seu-video-anuncio.mp4" type="video/mp4">
        Seu navegador não suporta vídeos.
    </video>
</section>

<footer>
    <p>&copy; 2026 Serralheria Profissional - Pinhais/PR</p>
</footer>

</body>
</html>
